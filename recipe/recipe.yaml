context:
  name: apache-airflow-providers-databricks
  version: "7.15.0"

package:
  name: ${{ name|lower }}
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/${{ name[0] }}/${{ name }}/apache_airflow_providers_databricks-${{ version }}.tar.gz
  sha256: 5ebea15a5d4701ddb525721579d97bcd223114fa0d1f6724e5f1038ded7d1f3e

build:
  noarch: python
  script: python -m pip install . -vv --no-deps --no-build-isolation
  number: 0

requirements:
  host:
    - python ${{ python_min }}.*
    - pip
    - flit-core ==3.12.0
  run:
    - python >=${{ python_min }}
    - apache-airflow >=2.11.0
    - apache-airflow-providers-common-compat >=1.13.0
    - apache-airflow-providers-common-sql >=1.32.0
    - requests >=2.32.0,<3
    - databricks-sql-connector >=4.0.0
    - aiohttp >=3.9.2,<4
    - mergedeep >=1.3.4
    # more restrictive for python >=3.14
    - pandas >=2.3.3
    # more restrictive for python >=3.14
    - pyarrow >=22.0.0

tests:
  - python:
      imports:
        - airflow.providers.databricks
      pip_check: true
      python_version:
        - ${{ python_min }}.*
        - "*"

about:
  homepage: https://github.com/apache/airflow/
  summary: Provider package apache-airflow-providers-databricks for Apache Airflow
  license: Apache-2.0
  license_file:
    - LICENSE
    - NOTICE
  documentation: https://airflow.apache.org/docs/apache-airflow-providers-databricks/stable/index.html
  repository: https://github.com/apache/airflow/

extra:
  recipe-maintainers:
    - xylar
